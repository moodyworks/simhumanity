<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>simhumanity — world</title>
  <style>
    html, body { margin: 0; height: 100%; background: #05070d; overflow: hidden;
      font: 13px ui-monospace, monospace; color: #cdd6e6; }
    #view { display: block; image-rendering: pixelated; }
    #hud { position: fixed; top: 10px; left: 10px; z-index: 5;
      background: rgba(10, 12, 18, 0.82); padding: 8px 11px; border-radius: 6px;
      white-space: pre; line-height: 1.55; pointer-events: none; }
    b { color: #ffd86b; }
    #spawn { position: fixed; inset: 0; z-index: 20; display: none;
      align-items: center; justify-content: center; background: rgba(5, 7, 13, 0.78); }
    #spawn .box { background: #11141d; border: 1px solid #2a3144; border-radius: 10px;
      padding: 22px 26px; max-width: 580px; box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6); }
    #spawn h2 { margin: 0 0 2px; font-size: 20px; color: #fff; }
    #spawn p { margin: 0 0 14px; color: #8ea0c0; }
    #spawnList { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    #spawnList button { display: flex; flex-direction: column; align-items: flex-start;
      gap: 2px; text-align: left; padding: 9px 12px; cursor: pointer; font: inherit;
      background: rgba(30, 36, 52, 0.9); color: #cdd6e6; border: 1px solid #39405a;
      border-radius: 7px; }
    #spawnList button:hover { background: #2a6aa0; border-color: #4a8fd0; }
    #spawnList .nm { color: #ffd86b; font-size: 15px; }
    #spawnList .meta { color: #93a3c0; font-size: 11px; }
    #log { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
      z-index: 8; background: rgba(10, 12, 18, 0.9); color: #ffe08a; padding: 7px 14px;
      border-radius: 7px; opacity: 0; transition: opacity 0.3s; pointer-events: none;
      font-size: 14px; }
  </style>
</head>
<body>
  <div id="hud">loading…</div>
  <div id="log"></div>
  <div id="spawn"><div class="box">
    <h2>Choose where to begin</h2>
    <p id="spawnEra"></p>
    <div id="spawnList"></div>
  </div></div>
  <canvas id="view"></canvas>
  <script src="/static/world.js"></script>
</body>
</html>
