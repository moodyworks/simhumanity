<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>simhumanity</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="hud">
    <div id="title">simhumanity <span id="era"></span></div>
    <div id="clock"></div>
    <div id="hpbar"><div id="hpfill"></div><div id="hptext"></div></div>
    <div id="vitals"></div>
    <div id="inv"></div>
    <div id="lore"></div>
    <div id="help">
      Click to walk · click a neighbor to talk/fight · minimap to look ·
      WASD move · <b>Shift run</b> · Space gather · B build · E dig ·
      F talk/trade · R attack · I relics · O fog
    </div>
  </div>
  <div id="buttons">
    <button onclick="toggleRelics()">Relics (I)</button>
    <button onclick="toggleBuildMenu()">Build (B)</button>
    <button id="fogBtn" onclick="toggleFog()">Fog: on (O)</button>
  </div>
  <div id="toast"></div>
  <div id="legend"></div>
  <canvas id="minimap"></canvas>
  <canvas id="view"></canvas>
  <script src="/static/game.js"></script>
</body>
</html>
